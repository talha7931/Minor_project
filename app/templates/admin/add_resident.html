{% extends 'base.html' %}
{% block title %}Add Resident{% endblock %}
{% block page_title %}Add New Resident{% endblock %}

{% block content %}
<div class="section-card form-card">
  <div class="card-header">
    <h2 class="card-title">New Resident Account</h2>
    <a href="{{ url_for('admin.residents') }}" class="btn btn-sm btn-secondary">← Back</a>
  </div>
  <form method="POST" class="form-body">
    <div class="form-row">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="name" required placeholder="John Doe" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" required placeholder="john@example.com" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required placeholder="••••••••" minlength="6" />
      </div>
      <div class="form-group">
        <label>Flat / House No.</label>
        <input type="text" name="flat_no" required placeholder="A-101" />
      </div>
    </div>
    <div class="form-group">
      <label>Phone (optional)</label>
      <input type="text" name="phone" placeholder="+91 98765 43210" />
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Create Resident</button>
      <a href="{{ url_for('admin.residents') }}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
