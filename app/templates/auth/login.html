{% extends 'base_public.html' %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="login-page">
  <div class="login-card">
    <div class="login-brand">
      <span class="brand-icon-lg">🚗</span>
      <h1>GateANPR</h1>
      <p>Society Gate Entry System</p>
    </div>

    <form method="POST" action="{{ url_for('auth.login') }}" class="login-form">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required autocomplete="email"
               placeholder="admin@example.com" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required
               autocomplete="current-password" placeholder="••••••••" />
      </div>
      <button type="submit" class="btn btn-primary btn-block">Sign In</button>
    </form>

    <div class="login-hints">
      <p class="hint-title">Demo Credentials</p>
      <div class="hint-grid">
        <div class="hint-item">
          <span class="role-badge role-admin">Admin</span>
          <code>admin@gate.com / Admin@123</code>
        </div>
        <div class="hint-item">
          <span class="role-badge role-security">Security</span>
          <code>guard@gate.com / Guard@123</code>
        </div>
        <div class="hint-item">
          <span class="role-badge role-resident">Resident</span>
          <code>resident1@gate.com / Res@1234</code>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
